<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>
    {% include meta.html %}
    {% include analytics.html %}
    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
    <script src="{{ site.baseurl }}/assets/utils/jquery-1.12.4/jquery-1.12.4.min.js"></script>
    <script src="{{ site.baseurl }}/assets/utils/simple-jekyll-search.js"></script>

    <link href="https://fonts.googleapis.com/css?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,700|Noto+Sans+KR:300,400,700|Raleway:400,700" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/utils/fontawesome-free-5.7.2-web/css/all.min.css" />
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  </head>
  <body>

    <div class="header-wrap" role="header">
      <div class="container">
        <a href="{{ site.baseurl }}/" class="header-title">
          <div class="header-title-left">S<span class="sub">LOW</span></div>
          and
          <div class="header-title-right">S<span class="sub">TEADY</span></div>
        </a>
      </div>
    </div>

    <nav class="nav-wrap" role="nav">
      <div class="container">
        <a href="{{ site.baseurl }}/" class="nav">Posts</a>
        <!-- <a href="{{ site.baseurl }}/playground/" class="nav">playground</a> -->
        <!-- <a href="{{ site.baseurl }}/works/" class="nav">works</a> -->
        <a href="{{ site.baseurl }}/about/" class="nav">About</a>

        <div class="search-wrap">
          <div class="search-toggle"></div>
          <input id="search-input" class="search-text" type="search" placeholder="검색어를 입력하세요" autocomplete="off" />
        </div>
        <ul id="search-result"></ul>
      </div>
    </nav>

    <div class="main-wrap" role="main">
      <div class="container">
        {{ content }}
      </div>
    </div>

    <script type="text/javascript">

      var sjs = SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('search-result'),
        noResultsText: '',
        json: '/search.json',
      });

      $(document).ready(function() {
        var $nav = $('.nav[href="' + location.pathname + '"]');
        if ($nav.length > 0) {
          $nav.addClass('active');
        } else {
          $('.nav[href="/"]').addClass('active');
        };
      });

      $(window).click(function(e) {
        if (!$(e.target).hasClass('search-toggle') && !$(e.target).hasClass('search-text')) {
          $('.search-wrap').removeClass('opened');
          $('.search-layer').css('display', 'none');
          $('#search-input').val('');
          $('#search-result').empty();
        };
      });
      $(document).on('click', '.search-toggle', function(e) {
        $('.search-wrap').toggleClass('opened');
        if ($('.search-wrap').hasClass('opened')) {
          $('.search-layer').css('display', 'block');
          $('#search-input').focus();
        } else {
          $('.search-layer').css('display', 'none');
          $('#search-input').val('');
          $('#search-result').empty();
        };
      });

    </script>
  </body>
</html>
