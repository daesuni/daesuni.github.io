<!DOCTYPE html>
<html>
  <head>
    <title>{{ site.name }}{% if page.title %} :: {{ page.title }}{% endif %}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
    <script src="{{ site.baseurl }}/assets/utils/jquery-1.12.4/jquery-1.12.4.min.js"></script>
    <script src="{{ site.baseurl }}/assets/utils/simple-jekyll-search.min.js"></script>

    <link href="https://fonts.googleapis.com/css?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nanum+Gothic:400,700|Lato:400,700&amp;subset=korean" rel="stylesheet">
    <!-- <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/utils/material-icons/material-icons.css" /> -->
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  </head>

  <body>
    <div class="container">
      <div class="header-wrap">
        <a href="{{ site.baseurl }}/" class="header-title">
          <div class="header-avatar"><img src="{{ site.avatar }}" /></div>
          {{ site.name }}
          <span class="header-description"> : {{ site.description }}</span>
        </a>

        <div class="spacer"></div>

        <nav class="nav-wrap">
          <a href="{{ site.baseurl }}/" class="nav">POSTS</a>
          <!-- <a href="{{ site.baseurl }}/playground/" class="nav">playground</a> -->
          <!-- <a href="{{ site.baseurl }}/works/" class="nav">works</a> -->
          <a href="{{ site.baseurl }}/about/" class="nav">ABOUT</a>
        </nav>
        <div class="search-wrap">
      		<input id="search-input" class="search-text" type="search" placeholder="검색어를 입력하세요" autocomplete="off" />
          <ul id="search-result"></ul>
        </div>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    {% include analytics.html %}

    <div class="footer-wrap">

    </div>

    <script type="text/javascript">
      var sjs = SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('search-result'),
        json: '/search.json'
      });

      $(document).ready(function() {
        var pathName = location.pathname.indexOf('page') > -1 ? '/' : location.pathname;
        $('.nav[href="' + pathName + '"]').addClass('accent');
      });

      $(document).on('focus', '#search-input', function() {
        $('#search-result').show();
      }).on('blur', '#search-input', function() {
        $('#search-result').hide();
      });

    </script>
  </body>
</html>
