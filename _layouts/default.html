<!DOCTYPE html>
<html>
  <head>
    <title>{{ site.name }}{% if page.title %} :: {{ page.title }}{% endif %}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
    <script src="{{ site.baseurl }}/assets/utils/jquery-1.12.4/jquery-1.12.4.min.js"></script>
    <script src="{{ site.baseurl }}/assets/utils/simple-jekyll-search.js"></script>

    <link href="https://fonts.googleapis.com/css?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700|Noto+Sans+KR:400,700" rel="stylesheet">
    <!-- <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/utils/material-icons/material-icons.css" /> -->
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  </head>

  <body>

    <div class="search-layer">
      <div class="container">
        <div class="search-wrap">
          <input id="search-input" class="search-text" type="text" placeholder="검색어를 입력하세요" autocomplete="off" />
          <div class="search-toggle search-close"><i class="material-icons">close</i></div>
        </div>
        <ul id="search-result"></ul>
      </div>
    </div>

    <div class="container">
      <div class="header-wrap">
        <!-- <a href="{{ site.baseurl }}/" class="header-title">
          <div class="header-avatar"><img src="{{ site.avatar }}" /></div>
          {{ site.name }}
          <span class="header-description"> : {{ site.description }}</span>
        </a>

        <div class="spacer"></div> -->

        <nav class="nav-wrap">
          <a href="{{ site.baseurl }}/" class="nav">POSTS</a>
          <!-- <a href="{{ site.baseurl }}/playground/" class="nav">playground</a> -->
          <!-- <a href="{{ site.baseurl }}/works/" class="nav">works</a> -->
          <a href="{{ site.baseurl }}/about/" class="nav">ABOUT</a>
        </nav>

        <div class="spacer"></div>

        <div class="search-toggle search-open"><i class="material-icons">search</i></div>

      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    {% include analytics.html %}

    <div class="footer-wrap">

    </div>

    <script type="text/javascript">
      var sjs = SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('search-result'),
        noResultsText: '검색 결과가 없습니다.',
        json: '/search.json',
      });

      $(document).ready(function() {
        var $nav = $('.nav[href="' + location.pathname + '"]');
        if ($nav.length > 0) {
          $nav.addClass('active');
        } else {
          $('.nav[href="/"]').addClass('active');
        };

        // $.ajax({
        //   type : 'GET',
        //   url : "https://www.googleapis.com/analytics/v3/data/ga?ids=ga%3A150211858&start-date=2019-02-02&end-date=2019-02-02&metrics=ga%3Asessions%2Cga%3Apageviews&dimensions=ga%3Asource%2Cga%3Akeyword&access_token=ya29.GlykBmlqN67m5LCWXl2iLkQCD545zwTMxQGgmK8dv3sSfi523heQxPtHvPSCe8H2K8Vq_j5I2O4Wph-Oq2dwyoYVBIxkO160neab22CtRGTX99uezJJ6kPG5ZmoCiQ",
        //   //data : {"id" : id},
        //   success : function (data) {
        //     if (data) {
        //         console.log(data)
        //     }
        //   }
        //
        // });




      });

      $(document).on('click', '.search-toggle', function() {
        $('.search-layer').toggle();
        if ($(this).hasClass('search-open')) {
          $('#search-input').focus();
        } else {
          $('#search-input').val('');
        };
      });

    </script>
  </body>
</html>
